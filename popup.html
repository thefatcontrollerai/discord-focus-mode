<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Focus Mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 220px;
      background: #2b2d31;
      color: #dbdee1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e1f22;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #f2f3f5;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .header p {
      font-size: 11px;
      color: #949ba4;
      margin-top: 2px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .toggle-label {
      font-size: 14px;
      color: #dbdee1;
    }

    .toggle-sub {
      font-size: 11px;
      color: #949ba4;
      margin-top: 1px;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #4e5058;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #5865f2;
    }

    input:checked + .slider:before {
      transform: translateX(18px);
    }

    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid #1e1f22;
      font-size: 11px;
      color: #4e5058;
    }

    kbd {
      background: #1e1f22;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
      color: #949ba4;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Focus Mode</h1>
    <p>Discord sidebar toggle</p>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Hide sidebars</div>
      <div class="toggle-sub">Expand chat to full width</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
    Shortcut: <kbd>Alt</kbd> + <kbd>H</kbd>
  </div>

  <script src="popup.js"></script>
</body>
</html>
