<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discord Focus Mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      background: #2b2d31;
      color: #dbdee1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e1f22;
    }
    .header h1 {
      font-size: 12px;
      font-weight: 700;
      color: #f2f3f5;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .section-label {
      padding: 10px 16px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #5c6068;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
    }
    .toggle-row:hover {
      background: #313338;
    }

    .toggle-label { font-size: 13px; color: #dbdee1; }
    .toggle-sub   { font-size: 11px; color: #6d7176; margin-top: 1px; }

    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #4e5058;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #5865f2; }
    input:checked + .slider:before { transform: translateX(16px); }

    .divider {
      border: none;
      border-top: 1px solid #1e1f22;
      margin: 4px 0;
    }

    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid #1e1f22;
      font-size: 11px;
      color: #4e5058;
    }
    kbd {
      background: #1e1f22;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
      color: #949ba4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Discord Focus Mode</h1>
  </div>

  <!-- Layout -->
  <div class="section-label">Layout</div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Sidebars</div>
      <div class="toggle-sub">Expand chat to full width</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-sidebars">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Chat bar -->
  <hr class="divider">
  <div class="section-label">Chat Bar</div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">GIF Button</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-hide-gif">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Sticker Button</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-hide-sticker">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Gift Button</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-hide-gift">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Apps Button</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle-hide-apps">
      <span class="slider"></span>
    </label>
  </div>



  <script src="popup.js"></script>
</body>
</html>
